name: Docker

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build info
        id: info
        run: |
          echo "commit=$(echo '${{ github.sha }}' | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          curl -sSL https://github.com/GoogleContainerTools/kaniko/releases/latest/download/executor-linux-amd64 -o /usr/local/bin/kaniko
          chmod +x /usr/local/bin/kaniko
          mkdir -p /kaniko/.docker
          echo "{\"auths\":{\"git.at.oechsler.it\":{\"auth\":\"$(echo -n '${{ github.actor }}:${{ secrets.FORGEJO_TOKEN }}' | base64 -w0)\"}}}" \
            > /kaniko/.docker/config.json
          /usr/local/bin/kaniko \
            --dockerfile=docker/Dockerfile \
            --context=dir://${{ github.workspace }} \
            --destination=git.at.oechsler.it/samuel/dash:${{ github.ref_name }} \
            --build-arg VERSION=${{ steps.info.outputs.version }} \
            --build-arg COMMIT=${{ steps.info.outputs.commit }} \
            --build-arg BUILD_DATE=${{ steps.info.outputs.build_date }} \
            --snapshot-mode=redo
