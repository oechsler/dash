name: Docker Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build info
        id: info
        run: |
          echo "commit=$(echo '${{ github.sha }}' | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build and push
        env:
          REGISTRY_TOKEN: ${{ secrets.FORGEJO_PACKAGE }}
        run: |
          curl -sSfL https://github.com/google/go-containerregistry/releases/download/v0.21.3/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin crane

          crane export gcr.io/kaniko-project/executor:v1.24.0 - \
            | tar -xO kaniko/executor > /usr/local/bin/kaniko
          chmod +x /usr/local/bin/kaniko

          mkdir -p /kaniko/.docker
          printf '{"auths":{"git.at.oechsler.it":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ github.actor }}' "${REGISTRY_TOKEN}" | base64 -w0)" \
            > /kaniko/.docker/config.json

          /usr/local/bin/kaniko \
            --dockerfile=docker/Dockerfile \
            --context=dir://${{ github.workspace }} \
            --destination=git.at.oechsler.it/samuel/dash:${{ github.ref_name }} \
            --destination=git.at.oechsler.it/samuel/dash:latest \
            --build-arg VERSION=${{ steps.info.outputs.version }} \
            --build-arg COMMIT=${{ steps.info.outputs.commit }} \
            --build-arg BUILD_DATE=${{ steps.info.outputs.build_date }} \
            --snapshot-mode=redo
