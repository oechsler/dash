name: Docker Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build info
        id: info
        run: |
          echo "commit=$(echo '${{ github.sha }}' | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Install buildah
        run: apt-get update && apt-get install -y buildah

      - name: Build and push
        run: |
          buildah build \
            --build-arg VERSION=${{ steps.info.outputs.version }} \
            --build-arg COMMIT=${{ steps.info.outputs.commit }} \
            --build-arg BUILD_DATE=${{ steps.info.outputs.build_date }} \
            -t git.at.oechsler.it/samuel/dash:${{ github.ref_name }} \
            -t git.at.oechsler.it/samuel/dash:latest \
            -f docker/Dockerfile .
          buildah push \
            --creds ${{ github.actor }}:${{ secrets.FORGEJO_TOKEN }} \
            git.at.oechsler.it/samuel/dash:${{ github.ref_name }}
          buildah push \
            --creds ${{ github.actor }}:${{ secrets.FORGEJO_TOKEN }} \
            git.at.oechsler.it/samuel/dash:latest
