name: Renovate

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          curl -fsSL https://nodejs.org/dist/v22.15.0/node-v22.15.0-linux-x64.tar.gz | tar -xz -C /usr/local --strip-components=1
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          curl -fsSL https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz | tar -xz -C /usr/local
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_PLATFORM: forgejo
          RENOVATE_ENDPOINT: https://git.at.oechsler.it/
          RENOVATE_REPOSITORIES: '["samuel/dash"]'
          RENOVATE_GIT_AUTHOR: Renovate Bot <renovate@git.at.oechsler.it>
          LOG_LEVEL: info
        run: npx --yes renovate
