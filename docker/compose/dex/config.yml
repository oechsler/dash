issuer: http://localhost:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true
  responseTypes:
    - code

staticClients:
  - id: dash
    secret: dash-local-secret
    name: Dash
    redirectURIs:
      - http://localhost:8080/session/login/callback

connectors:
  - type: ldap
    id: ldap
    name: LDAP
    config:
      host: openldap:389
      insecureNoSSL: true
      bindDN: cn=admin,dc=example,dc=com
      bindPW: adminpassword
      userSearch:
        baseDN: ou=users,dc=example,dc=com
        filter: "(objectClass=inetOrgPerson)"
        username: mail
        idAttr: uid
        emailAttr: mail
        nameAttr: cn
        preferredUsernameAttr: uid
      groupSearch:
        baseDN: ou=groups,dc=example,dc=com
        filter: "(objectClass=groupOfNames)"
        userMatchers:
          - userAttr: DN
            groupAttr: member
        nameAttr: cn
