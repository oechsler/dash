services:
  postgres:
    image: postgres:18-alpine
    container_name: dash-postgres
    restart: unless-stopped
    env_file: postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dash -d dash"]
      interval: 5s
      timeout: 5s
      retries: 5

  dash:
    # ---
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    # ---
    image: ghcr.io/oechsler/dash:latest
    container_name: dash
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file: dash.env
    healthcheck:
      test: ["CMD", "/dash/healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  postgres_data:
