services:
  postgres:
    image: postgres:18-alpine
    container_name: dash-postgres-dev
    restart: unless-stopped
    env_file: postgres.dev.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dash -d dash"]
      interval: 5s
      timeout: 5s
      retries: 5

  dex:
    image: ghcr.io/dexidp/dex:v2.45.1
    container_name: dash-dex-dev
    restart: unless-stopped
    ports:
      - "5556:5556"
    volumes:
      - ./dex:/etc/dex:ro
    command: ["dex", "serve", "/etc/dex/config.yml"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5556/dex/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  dash:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    container_name: dash-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      dex:
        condition: service_healthy
    # network_mode: host lets the container share the host's network stack.
    # This means localhost:5432 (postgres) and localhost:5556 (dex) are
    # reachable with the same URLs the browser uses — no hostname tricks needed.
    # Linux-only; works fine on NixOS/CachyOS.
    network_mode: host
    env_file: dash.dev.env
    healthcheck:
      test: ["CMD", "/dash/healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  postgres_dev_data:
